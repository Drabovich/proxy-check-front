<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ffffff">
    <title>Proxy check</title>
    <style>
      .app-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 28px;
        background-color: #ffffff;
        color: #303345;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        transition: opacity 0.4s ease, visibility 0.4s ease;
      }

      .app-loader--hide {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .app-loader__spinner {
        position: relative;
        width: 48px;
        height: 48px;
      }

      .app-loader__spinner::before,
      .app-loader__spinner::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 3px solid transparent;
      }

      .app-loader__spinner::before {
        border-top-color: #303345;
        animation: app-loader-spin 0.9s cubic-bezier(0.5, 0, 0.5, 1) infinite;
      }

      .app-loader__spinner::after {
        inset: 6px;
        border-right-color: #6b6d80;
        animation: app-loader-spin 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite reverse;
      }

      .app-loader__brand {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        text-align: center;
      }

      .app-loader__title {
        margin: 0;
        font-size: 18px;
        font-weight: 500;
        letter-spacing: -0.02em;
        line-height: 1.2;
      }

      .app-loader__hint {
        margin: 0;
        font-size: 13px;
        font-weight: 400;
        color: #6b6d80;
        line-height: 1.3;
      }

      @keyframes app-loader-spin {
        to {
          transform: rotate(360deg);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .app-loader__spinner::before,
        .app-loader__spinner::after {
          animation-duration: 1.8s;
        }
      }
    </style>
  </head>
  <body>
    <div id="app-loader" class="app-loader" role="status" aria-live="polite" aria-busy="true" aria-label="Loading application">
      <div class="app-loader__spinner" aria-hidden="true"></div>
      <div class="app-loader__brand">
        <p class="app-loader__title">Proxy check</p>
        <p class="app-loader__hint">Loading…</p>
      </div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
